<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Valor por extenso</title>
  </head>
  <body>
    <div id="fade" class="hide">
      <div id="message">
        <div class="alert">
          <h4>[Mensagem]</h4>
          <p>[texto da mensagem...]</p>
          <input type="button" id="closeMessage" value="Fechar" />
        </div>
      </div>
    </div>

    <div class="container">
      <div class="header">
        <button id="menuBtn" class="menuBtn">☰</button>
        <span>Escrever Valor por Extenso</span>
      </div>
      <nav id="sideMenu" class="sideMenu">
        <a href="index.html">Valor por extenso</a>
        <a href="sorteio.html">Sorteador</a>
      </nav>

      <div id="menuOverlay" class="menuOverlay"></div>
      <div class="main">
        <div>
          <span>Valor em Reais</span>
          <input type="text" id="amount" inputmode="numeric" placeholder="Digite aqui o valor" />
          <input type="button" id="btnWriteAmountWords" value="Escrever por extenso" />
        </div>
        <div>
          <textarea name="response" id="response" readonly></textarea>
          <div class="copyGroup">
            <input type="button" id="btnCopyText" value="Copiar texto" />
            <div class="copiedTag">
              <svg class="copiedIcon" viewBox="0 0 24 24">
                <path class="checkPath" d="M5 13l4 4L19 7" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Copiado!</span>
            </div>
          </div>
        </div>
      </div>
      <div class="footer">
        <small> <span class="currentYear"></span> | <span>Desenvolvido por Hudson Andrade Viana</span> | <span>v2.1</span> </small>
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
